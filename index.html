<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="main-container">
            <!-- Banner esquerdo -->
            <aside class="banner-container">
                <img src="img/banner2.png" alt="Crie uma conta no Instagram">
            </aside>
            
            <!-- Lado direito - Formulários -->
            <section class="form-container">
                <!-- Caixa de Login -->
                <div class="login-box">
                    <img src="img/logo_instagram.png" alt="Instagram" class="logo-instagram">
                    
                    <form id="login-form">
                        <input 
                            type="text" 
                            placeholder="Número de telefone, nome de usuário ou e-mail"
                            required
                        >
                        <input 
                            type="password" 
                            placeholder="Senha"
                            required
                        >
                        <button type="submit">Entrar</button>
                    </form>
                    
                    <div class="divider">
                        <span>OU</span>
                    </div>
                    
                    <div class="facebook-login">
                        <a href="#">
                            <img src="img/logo_facebook.svg" alt="Facebook">
                            Entrar com o Facebook
                        </a>
                    </div>
                    
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                
                <!-- Caixa de Cadastro -->
                <div class="signup-box">
                    <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                </div>
                
                <!-- Baixar App -->
                <div class="app-download">
                    <p>Obtenha o aplicativo.</p>
                    <div class="app-buttons">
                        <a href="#">
                            <img src="img/apple_btn.png" alt="Baixar na App Store">
                        </a>
                        <a href="#">
                            <img src="img/gplay_btn.png" alt="Baixar no Google Play">
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <footer>
        <ul class="footer-links">
            <li><a href="#">Meta</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Ajuda</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">Privacidade</a></li>
            <li><a href="#">Termos</a></li>
            <li><a href="#">Localização</a></li>
            <li><a href="#">Instagram Lite</a></li>
            <li><a href="#">Threads</a></li>
        </ul>
        <p class="copyright">&copy; 2026 Instagram from Meta</p>
    </footer>
</body>
</html>
