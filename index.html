<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="styles.css">
    <!-- trocando o ícone do navegador -->
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>
    <main>
        <div class="main-container">
            <!-- container do banner -->
            <div id="banner-container">
                <img src="img/banner2.png" alt="Crie uma conta no instagram">
            </div>
            <!-- Login e registro -->
            <div class="form-container">
                <div id="form-box">
                    <!-- Nome Instagram -->
                    <img src="img/logo_instagram.png" alt="Instagram">
                    <!-- Form de login para entrar -->
                    <form id="login-form">
                        <input 
                        type="text"
                        name="username"
                        placeholder="Número de telefone, nome de usuário ou e-mail"
                        >
                        <input type="password" name="password" placeholder="Senha">
                    </form>

                    <div class="separator">
                        <div class="line"></div>
                        <span>Ou</span>
                    </div>

                    <div class="other-links">
                        <!-- Para logar com o Facebook -->
                        <div class="facebook-login">
                            <a href="#">
                                <img src="img/logo_facebook.svg" alt="Login por Facebook">
                                <span>Entrar com o Facebook</span>
                            </a>
                        </div>
                        <!-- Caso o usuário tenha esquecido a senha -->
                        <div id="forgot-pass">
                            <a href="#">Esqueci minha senha</a>
                        </div>
                    </div>
                </div>

                <!-- Área para fazer cadastro -->
                <div class="register-container">
                    <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                </div>
                <div id="get-app-container">
                    <p>Obtenha o aplicativo</p>
                    <a href="#">
                        <img src="img/apple_btn.png" alt="Apple Store">
                    </a>
                    <a href="#">
                        <img src="img/gplay_btn.png" alt="Google Play">
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <nav>
            <ul id="footer-links">
                <li><a href="#">Meta</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Ajuda</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">API</a></li>
                <li><a href="#">Privacidade</a></li>
                <li><a href="#">Termos</a></li>
                <li><a href="#">Principais contas</a></li>
                <li><a href="#">Hashtags</a></li>
                <li><a href="#">Localização</a></li>
                <li><a href="#">Instagram Lite</a></li>
            </ul>
        </nav>
        <p id="copyright">&copy;2026 Instagram from Meta</p>
    </footer>
</body>
</html>
